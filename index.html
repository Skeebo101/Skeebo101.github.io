<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard</title>
    <style>
        :root {
            --bg: #030303;
            --panel: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-accent: #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            overflow: hidden;
            padding: 20px;
        }

        .box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        /* Larger Date Box */
        .date-box {
            padding: 32px 24px;
            font-size: 1.6rem; /* Increased size for prominence */
            font-weight: 700;
            color: var(--text-accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .time-box {
            padding: 48px 24px;
            color: var(--text-primary);
        }

        .time { font-size: clamp(5rem, 10vw, 8rem); font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        .ampm { font-size: 2rem; color: var(--text-accent); font-weight: 300; margin-left: 12px; }
    </style>
</head>
<body>

    <div class="box date-box" id="date-full">---</div>
    
    <div class="box time-box">
        <div class="time" id="time-display">0:00</div>
        <div class="ampm" id="ampm-display">PM</div>
    </div>

    <script>
        function update() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
            const dayStr = now.toLocaleDateString('en-US', { weekday: 'long' });
            document.getElementById('date-full').textContent = `${dateStr} • ${dayStr}`;
            
            let h = now.getHours();
            const am = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('time-display').textContent = `${h}:${now.getMinutes().toString().padStart(2, '0')}`;
            document.getElementById('ampm-display').textContent = am;
        }
        
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
