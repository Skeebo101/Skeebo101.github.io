<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Live Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --accent: #00f2fe;
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            padding: 24px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .label { color: var(--text-dim); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
        .value { font-size: 1.5rem; font-weight: 600; }
        .weather-value { color: var(--accent); font-size: 2rem; font-weight: 700; }

        .main-column { display: flex; flex-direction: column; gap: 24px; }
        .welcome-card { height: 120px; justify-content: center; }
        .clock-card { flex-grow: 1; justify-content: center; align-items: center; }

        .clock-time { font-size: clamp(6rem, 18vw, 16rem); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.05em; line-height: 1; }
        .clock-ampm { font-size: 3rem; font-weight: 300; font-style: italic; color: var(--accent); margin-left: 12px; }
        
        /* Updated Calendar Styles */
        #month-display { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 20px; text-align: center; color: var(--accent); }
        #cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; text-align: center; font-size: 1.1rem; }
        .day-head { color: var(--text-dim); font-weight: 400; font-size: 0.9rem; padding-bottom: 10px; }
        .today { color: var(--accent); font-weight: 700; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="card">
            <div class="label">Date</div>
            <div class="value" id="date-display">...</div>
        </div>
        <div class="card">
            <div class="label">Santa Clarita</div>
            <div class="weather-value">74°F</div>
            <div style="color: var(--text-dim);">Clear Sky</div>
        </div>
        <div class="card" style="flex-grow:1;">
            <div id="month-display">...</div>
            <div id="cal"></div>
        </div>
    </div>

    <div class="main-column">
        <div class="card welcome-card">
            <div style="font-size: 2rem; font-weight: 400; color: var(--text-dim);">Welcome</div>
        </div>
        <div class="card clock-card">
            <div style="display: flex; align-items: baseline;">
                <div class="clock-time" id="time-display">0:00</div>
                <div class="clock-ampm" id="ampm-display">AM</div>
            </div>
        </div>
    </div>

    <script>
        function updateDashboard() {
            const now = new Date();
            document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('time-display').textContent = `${hours}:${now.getMinutes().toString().padStart(2, '0')}`;
            document.getElementById('ampm-display').textContent = ampm;
        }

        const now = new Date();
        document.getElementById('month-display').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        const cal = document.getElementById('cal');
        ['S','M','T','W','T','F','S'].forEach(d => cal.innerHTML += `<div class="day-head">${d}</div>`);
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for(let i=1; i<=daysInMonth; i++) {
            cal.innerHTML += `<div class="${i===now.getDate()?'today':''}">${i}</div>`;
        }
        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
